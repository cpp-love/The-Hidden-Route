# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      # Set up a matrix to run the following 3 configurations(1 removed):
      # 1. <Windows, Release, latest MSVC compiler toolchain on the default runner image, default generator>
      # 2. <Linux, Release, latest GCC compiler toolchain on the default runner image, default generator>
      # REMOVED(reason: clang does not support `std::generator`): 3. <Linux, Release, latest Clang compiler toolchain on the default runner image, default generator>
      #
      # To add more build types (Release, Debug, RelWithDebInfo, etc.) customize the build_type list.
      matrix:
        os: [ubuntu-latest, windows-2025-vs2026]
        build_type: [Release]
        c_compiler: [gcc-16, cl]
        preset: [BuildAll]
        include:
          - os: windows-2025-vs2026
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc-16
            cpp_compiler: g++-16
        exclude:
          - os: windows-2025-vs2026
            c_compiler: gcc-16
          - os: ubuntu-latest
            c_compiler: cl

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set reusable strings
        # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Set ccache directory (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: echo "CCACHE_DIR=$HOME/.cache/ccache" >> $GITHUB_ENV

      - name: Set ccache directory (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ccachePath = "$env:LOCALAPPDATA\ccache"
          echo "CCACHE_DIR=$ccachePath" >> $env:GITHUB_ENV

      - name: "[Windows Only]: Setup MSVC"
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: "[Linux Only]: Install Linux dependencies"
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y 
          sudo apt-get update
          sudo apt-get install -y \
            ccache \
            gcc-16 \
            g++-16 \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxext-dev \
            libgl-dev \
            libudev-dev \
            libmbedtls-dev \
            libssh2-1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libogg-dev \
            libvorbis-dev \
            libflac-dev

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.strings.outputs.build-output-dir }}/_deps
          key: ${{ runner.os }}-fetchcontent-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-fetchcontent-

      - name: Configure CMake
        # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
        # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
        run: >
          cmake -B ${{ steps.strings.outputs.build-output-dir }}
          --preset ${{ matrix.preset }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -S ${{ github.workspace }}

      - name: Build
        # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

      - name: Test (Linux)
        if: runner.os == 'Linux'
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        # Execute tests defined by the CMake configuration. Note that --build-config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
        # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
        run: xvfb-run --auto-servernum ctest --build-config ${{ matrix.build_type }} --output-on-failure

      - name: Test (Windows)
        if: runner.os == 'Windows'
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        # Execute tests defined by the CMake configuration. Note that --build-config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
        # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
        run: ctest --build-config ${{ matrix.build_type }} --output-on-failure

      - name: Show ccache states
        run: ccache -s
